name: build

on:
  push:
    tags: ["v*", "chrome-*"]
  workflow_dispatch:
    inputs:
      version:
        description: "Chrome version (e.g. 150.0.7871.24). Tags the release chrome-<version>. Leave empty for a build-only run."
        required: false

env:
  # Chrome's libjpeg-turbo fork SHA lives in chrome.lock (written by track.yml).
  # The Chrome fork ships only BUILD.gn (no CMakeLists.txt), so we build the
  # matching UPSTREAM libjpeg-turbo release (read from the fork's jpeglib.h),
  # which is the exact version Chrome vendors, using its native CMake.
  FORK_REPO: https://chromium.googlesource.com/chromium/deps/libjpeg_turbo.git
  UPSTREAM_REPO: https://github.com/libjpeg-turbo/libjpeg-turbo.git

jobs:
  build:
    runs-on: ${{ matrix.os }}
    timeout-minutes: 90
    strategy:
      fail-fast: false
      matrix:
        # Two matrix dimensions => 4 parallel jobs (os x mode). Each leg ships
        # one ASAN-instrumented artifact:
        #   asan      -> static + dynamic libraries (link into your own harness)
        #   libfuzzer -> self-contained libFuzzer binaries (libFuzzer engine)
        os: [ubuntu-latest, windows-latest]
        mode: [asan, libfuzzer]

    steps:
      - name: Checkout this repository
        uses: actions/checkout@v4

      - name: Read Chrome-locked revision from chrome.lock
        id: lock
        shell: bash
        run: |
          echo "sha=$(jq -r .sha chrome.lock)" >> "$GITHUB_OUTPUT"

      - name: Resolve the libjpeg-turbo release Chrome vendors
        id: ver
        shell: bash
        run: |
          # Read LIBJPEG_TURBO_VERSION straight from the Chrome fork's header so
          # the build always matches the version Chrome actually ships.
          # LIBJPEG_TURBO_VERSION lives in jconfig.h (jpeglib.h only carries the
          # IJG JPEG_LIB_VERSION, not the turbo version).
          HDR=$(curl -fsSL "${FORK_REPO}/+/${{ steps.lock.outputs.sha }}/src/jconfig.h?format=TEXT" | base64 -d)
          LJT_VER=$(printf '%s\n' "$HDR" | sed -nE 's/#define[[:space:]]+LIBJPEG_TURBO_VERSION[[:space:]]+([0-9.]+)/\1/p' | head -1)
          test -n "$LJT_VER" || { echo "could not determine libjpeg-turbo version from fork header"; exit 1; }
          echo "libjpeg_turbo_version=$LJT_VER" >> "$GITHUB_OUTPUT"
          echo "Resolved Chrome libjpeg-turbo version: $LJT_VER"

      - name: Install dependencies (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            build-essential cmake ninja-build git ca-certificates curl clang

      - name: Install dependencies (Windows)
        if: runner.os == 'Windows'
        shell: bash
        run: |
          # clang-cl and cmake are preinstalled on windows-latest.
          choco install ninja -y --no-progress

      - name: Fetch upstream libjpeg-turbo source (Chrome-vendored release)
        shell: bash
        run: |
          git clone --depth 1 --branch "${{ steps.ver.outputs.libjpeg_turbo_version }}" "$UPSTREAM_REPO" src

      - name: Resolve the ASAN + libFuzzer toolchain
        shell: bash
        run: |
          # Two flag sets:
          #   ASAN_*  -> library pass: ASAN memory checks only, clean lib.
          #   FUZZ_*  -> libFuzzer pass: ASAN + SanitizerCoverage on the lib
          #              (fuzzer-no-link), and FUZZ_LIBRARY is the libFuzzer
          #              runtime that supplies main() for the fuzz targets.
          if [ "$RUNNER_OS" = "Windows" ]; then
            echo "CC=clang-cl" >> "$GITHUB_ENV"
            echo "CXX=clang-cl" >> "$GITHUB_ENV"
            echo "ASAN_CFLAGS=-fsanitize=address -g -O1 /Zi" >> "$GITHUB_ENV"
            echo "ASAN_LDFLAGS=-fsanitize=address /DEBUG" >> "$GITHUB_ENV"
            echo "FUZZ_CFLAGS=-fsanitize=fuzzer-no-link,address -g -O1 /Zi" >> "$GITHUB_ENV"
          else
            echo "CC=clang" >> "$GITHUB_ENV"
            echo "CXX=clang++" >> "$GITHUB_ENV"
            echo "ASAN_CFLAGS=-fsanitize=address -g -O1" >> "$GITHUB_ENV"
            echo "ASAN_LDFLAGS=-fsanitize=address" >> "$GITHUB_ENV"
            echo "FUZZ_CFLAGS=-fsanitize=fuzzer-no-link,address -g -O1" >> "$GITHUB_ENV"
          fi

          # Locate the libFuzzer runtime (supplies main() for the fuzz targets).
          FUZZ_LIBRARY=""
          for cand in clang_rt.fuzzer-x86_64 libclang_rt.fuzzer-x86_64; do
            if [ "$RUNNER_OS" = "Windows" ]; then
              p=$(clang-cl -print-file-name="$cand.lib" 2>/dev/null || true)
            else
              p=$(clang -print-file-name=lib$cand.a 2>/dev/null || true)
            fi
            if [ -n "$p" ] && [ -f "$p" ]; then FUZZ_LIBRARY="$p"; break; fi
          done
          test -n "$FUZZ_LIBRARY" || { echo "libFuzzer runtime not found"; exit 1; }
          echo "FUZZ_LIBRARY=$FUZZ_LIBRARY" >> "$GITHUB_ENV"

      - name: Set up MSVC environment (Windows)
        if: runner.os == 'Windows'
        uses: ilammy/msvc-dev-cmd@v1
        with:
          arch: x64

      - name: Build libjpeg-turbo static + dynamic (ASAN)
        if: matrix.mode == 'asan'
        shell: bash
        run: |
          mkdir -p out/lib/include
          # ENABLE_STATIC=1 + ENABLE_SHARED=1 produce both libraries.
          # WITH_TURBOJPEG=1 also builds the turbojpeg (TJ) API. WITH_FUZZ=0 so
          # no fuzzer harness targets are built (we ship libraries only).
          cmake -S src -B build-asan -G Ninja \
            -DCMAKE_C_COMPILER="$CC" \
            -DCMAKE_CXX_COMPILER="$CXX" \
            -DCMAKE_C_FLAGS_INIT="$ASAN_CFLAGS" \
            -DCMAKE_CXX_FLAGS_INIT="$ASAN_CFLAGS" \
            -DCMAKE_EXE_LINKER_FLAGS_INIT="$ASAN_LDFLAGS" \
            -DCMAKE_SHARED_LINKER_FLAGS_INIT="$ASAN_LDFLAGS" \
            -DCMAKE_TRY_COMPILE_TARGET_TYPE=STATIC_LIBRARY \
            -DCMAKE_MSVC_RUNTIME_LIBRARY=MultiThreaded \
            -DENABLE_STATIC=1 \
            -DENABLE_SHARED=1 \
            -DWITH_TURBOJPEG=1 \
            -DWITH_SIMD=0 \
            -DWITH_FUZZ=0
          cmake --build build-asan

          # Gather real library files only (-type f skips Linux .so symlinks).
          find build-asan -type f \( \
              -name 'libjpeg*.a' -o -name 'libjpeg*.so*' -o \
              -name 'libturbojpeg*.a' -o -name 'libturbojpeg*.so*' -o \
              -name 'jpeg*.lib' -o -name 'jpeg*.dll' -o \
              -name 'turbojpeg*.lib' -o -name 'turbojpeg*.dll' -o \
              -name '*.pdb' \
            \) -exec cp {} out/lib/ \;

          # Public headers: jpeglib.h/jmorecfg.h/jerror.h/turbojpeg.h ship in
          # the source tree; jconfig.h is generated. The consumer's jpeglib.h
          # #include "jconfig.h", so the generated copy is the one that matters.
          cp src/jpeglib.h src/jmorecfg.h src/jerror.h src/turbojpeg.h out/lib/include/ 2>/dev/null || true
          cp build-asan/jconfig.h out/lib/include/ 2>/dev/null || true
          ls -la out/lib out/lib/include

      - name: Build libjpeg-turbo libFuzzer targets
        if: matrix.mode == 'libfuzzer'
        shell: bash
        run: |
          mkdir -p out/fuzz
          # WITH_FUZZ=1 builds the fuzz/ harnesses (LLVMFuzzerTestOneInput) and
          # links each against the static lib + the libFuzzer runtime
          # (FUZZ_LIBRARY supplies main()). The lib is compiled with fuzzer
          # coverage via FUZZ_CFLAGS (fuzzer-no-link).
          cmake -S src -B build-fuzz -G Ninja \
            -DCMAKE_C_COMPILER="$CC" \
            -DCMAKE_CXX_COMPILER="$CXX" \
            -DCMAKE_C_FLAGS_INIT="$FUZZ_CFLAGS" \
            -DCMAKE_CXX_FLAGS_INIT="$FUZZ_CFLAGS" \
            -DCMAKE_EXE_LINKER_FLAGS_INIT="" \
            -DCMAKE_TRY_COMPILE_TARGET_TYPE=STATIC_LIBRARY \
            -DCMAKE_MSVC_RUNTIME_LIBRARY=MultiThreaded \
            -DENABLE_STATIC=1 \
            -DENABLE_SHARED=0 \
            -DWITH_TURBOJPEG=1 \
            -DWITH_SIMD=0 \
            -DWITH_FUZZ=1 \
            -DFUZZ_LIBRARY="$FUZZ_LIBRARY" \
            -DFUZZ_BINDIR="$PWD/out/fuzz" \
            -DFUZZER_SUFFIX=""
          cmake --build build-fuzz

          # FUZZ_BINDIR is the *install* destination, not the build output dir,
          # so the fuzz exes live under build-fuzz/. Gather them (and .pdb
          # sidecars) plus the fuzzer dictionaries from the build tree.
          find build-fuzz -type f \
            \( -name '*_fuzzer' -o -name '*_fuzzer.exe' -o -name '*_fuzzer.pdb' -o -name '*.dict' \) \
            -exec cp {} out/fuzz/ \;
          ls -la out/fuzz

      - name: Verify artifacts
        shell: bash
        run: |
          if [ "${{ matrix.mode }}" = "asan" ]; then
            STAT=$(find out/lib -type f \( -name 'libjpeg*.a' -o -name 'jpeg-static*.lib' -o -name 'jpeg*.lib' \) | head -1)
            DYN=$(find out/lib -type f \( -name 'libjpeg*.so*' -o -name 'jpeg*.dll' \) | head -1)
            test -n "$STAT" || { echo "ERROR: ASAN static lib missing"; exit 1; }
            test -n "$DYN"  || { echo "ERROR: ASAN dynamic lib missing"; exit 1; }
            echo "asan-static:  $STAT"
            echo "asan-dynamic: $DYN"
          else
            FZ=$(find out/fuzz -type f \( -name '*_fuzzer' -o -name '*_fuzzer.exe' \) | head -1)
            test -n "$FZ" || { echo "ERROR: libFuzzer binary missing"; exit 1; }
            echo "libfuzzer: $FZ"
          fi

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: jpeg-asan-${{ matrix.mode }}-${{ matrix.os }}
          path: out
          if-no-files-found: error

  release:
    needs: build
    if: startsWith(github.ref, 'refs/tags/') || (github.event_name == 'workflow_dispatch' && inputs.version != '')
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Resolve release tag
        id: tag
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ] && [ -n "${{ inputs.version }}" ]; then
            echo "tag=chrome-${{ inputs.version }}" >> "$GITHUB_OUTPUT"
          else
            echo "tag=${{ github.ref_name }}" >> "$GITHUB_OUTPUT"
          fi

      - name: Publish Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.tag.outputs.tag }}
          name: ${{ steps.tag.outputs.tag }}
          files: artifacts/**/*
