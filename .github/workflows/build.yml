name: build

on:
  push:
    tags: ["v*", "libjpeg-turbo-*"]
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag, e.g. libjpeg-turbo-640f254a."
        required: false

env:
  # Chrome's libjpeg-turbo fork SHA lives in chrome.lock (written by track.yml).
  # The Chrome fork ships only BUILD.gn (no CMakeLists.txt), so we build the
  # matching UPSTREAM libjpeg-turbo release (read from the fork's jpeglib.h),
  # which is the exact version Chrome vendors, using its native CMake.
  FORK_REPO: https://chromium.googlesource.com/chromium/deps/libjpeg_turbo.git
  UPSTREAM_REPO: https://github.com/libjpeg-turbo/libjpeg-turbo.git

jobs:
  build:
    runs-on: ${{ matrix.os }}
    timeout-minutes: 90
    strategy:
      fail-fast: false
      matrix:
        # Two matrix dimensions => 3 jobs (Windows ships asan only). Each leg
        # ships one ASAN-instrumented artifact:
        #   asan      -> static + dynamic libraries (link into your own harness)
        #   libfuzzer -> self-contained libFuzzer binaries (libFuzzer engine)
        os: [ubuntu-latest, windows-latest]
        mode: [asan, libfuzzer]
        exclude:
          # libjpeg-turbo's UPSTREAM fuzz harnesses (fuzz/cjpeg.cc et al.) are
          # POSIX: they #include <unistd.h>, which clang-cl/MSVC does not ship.
          # They do not compile on Windows, so the libFuzzer binaries are built
          # on Linux only. Windows still ships the ASAN static + dynamic libs
          # (the primary deliverable for Windows AFL++ fuzzing).
          - os: windows-latest
            mode: libfuzzer

    steps:
      - name: Checkout this repository
        uses: actions/checkout@v4

      - name: Read Chrome-locked revision from chrome.lock
        id: lock
        shell: bash
        run: |
          echo "sha=$(jq -r .sha chrome.lock)" >> "$GITHUB_OUTPUT"

      - name: Resolve the libjpeg-turbo release Chrome vendors
        id: ver
        shell: bash
        run: |
          # Read LIBJPEG_TURBO_VERSION straight from the Chrome fork's header so
          # the build always matches the version Chrome actually ships.
          # LIBJPEG_TURBO_VERSION lives in jconfig.h (jpeglib.h only carries the
          # IJG JPEG_LIB_VERSION, not the turbo version).
          HDR=$(curl -fsSL "${FORK_REPO}/+/${{ steps.lock.outputs.sha }}/src/jconfig.h?format=TEXT" | base64 -d)
          LJT_VER=$(printf '%s\n' "$HDR" | sed -nE 's/#define[[:space:]]+LIBJPEG_TURBO_VERSION[[:space:]]+([0-9.]+)/\1/p' | head -1)
          test -n "$LJT_VER" || { echo "could not determine libjpeg-turbo version from fork header"; exit 1; }
          echo "libjpeg_turbo_version=$LJT_VER" >> "$GITHUB_OUTPUT"
          echo "Resolved Chrome libjpeg-turbo version: $LJT_VER"

      - name: Install dependencies (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            build-essential cmake ninja-build git ca-certificates curl clang

      - name: Install dependencies (Windows)
        if: runner.os == 'Windows'
        shell: bash
        run: |
          # ninja is not preinstalled on windows-latest.
          choco install ninja -y --no-progress
          # The clang-cl already on PATH is the VS-bundled REDUCED LLVM, which
          # omits the sanitizer runtimes (clang_rt.asan-x86_64.lib and the
          # fuzzer runtime) that the ASAN DLL and the libFuzzer exes must link.
          # Install a COMPLETE LLVM (full runtime set); the toolchain step pins
          # CC/CXX to it explicitly so PATH reordering by msvc-dev-cmd cannot
          # revert us to the reduced build.
          choco install llvm -y --no-progress

      - name: Fetch upstream libjpeg-turbo source (Chrome-vendored release)
        shell: bash
        run: |
          git clone --depth 1 --branch "${{ steps.ver.outputs.libjpeg_turbo_version }}" "$UPSTREAM_REPO" src

      # MSVC env is set up BEFORE the toolchain step so the SDK libraries are
      # on LIB and the MSVC headers on INCLUDE for the clang-cl + /MT build.
      # The ASAN runtime itself is passed as an absolute path on the link line
      # (see the toolchain step), not via LIB.
      - name: Set up MSVC environment (Windows)
        if: runner.os == 'Windows'
        uses: ilammy/msvc-dev-cmd@v1
        with:
          arch: x64

      - name: Resolve the ASAN + libFuzzer toolchain
        shell: bash
        run: |
          # Two flag sets:
          #   ASAN_*  -> library pass: ASAN memory checks only, clean lib.
          #   FUZZ_*  -> libFuzzer pass: ASAN + SanitizerCoverage on the lib
          #              (fuzzer-no-link), and FUZZ_LIBRARY is the libFuzzer
          #              runtime that supplies main() for the fuzz targets.
          # /MT must live in the flags themselves, not only in
          # CMAKE_MSVC_RUNTIME_LIBRARY. The runtime-library property applies
          # to real targets but NOT to CMake's try_compile/check_* probes, so
          # those probes would otherwise compile with the default /MD. clang-cl
          # rejects -fsanitize=address under /MD ("ASAN requires static CRT"),
          # which makes every configure check fail (even stddef.h, a clang
          # builtin, reports "not found") and trips libjpeg-turbo's
          # INLINE_WORKS FATAL_ERROR.
          if [ "$RUNNER_OS" = "Windows" ]; then
            # Pin CC/CXX to the COMPLETE LLVM installed in the deps step
            # (C:\Program Files\LLVM). The bare 'clang-cl' on PATH is the
            # VS-bundled REDUCED LLVM, which omits the ASAN/fuzzer runtimes, so
            # -print-file-name returns a bare name and the DLL/fuzz-exe links
            # fail. The explicit path is immune to PATH reordering by
            # msvc-dev-cmd, and keeps the compiler and the ASAN runtime from
            # the same LLVM (matching ABI). CLANG is the same path held as a
            # plain shell var for the -print-file-name / FUZZ_LIBRARY lookups
            # below (GITHUB_ENV writes do not affect the current shell).
            CLANG_CL="C:/Program Files/LLVM/bin/clang-cl.exe"
            CLANG="$CLANG_CL"
            echo "CC=$CLANG_CL" >> "$GITHUB_ENV"
            echo "CXX=$CLANG_CL" >> "$GITHUB_ENV"
            echo "ASAN_CFLAGS=-fsanitize=address -g -O1 /Zi /MT" >> "$GITHUB_ENV"
            echo "FUZZ_CFLAGS=-fsanitize=fuzzer-no-link,address -g -O1 /Zi /MT" >> "$GITHUB_ENV"

            # The shipped Windows LLVM (20.1.x) provides ONLY the DYNAMIC ASAN
            # runtime: clang_rt.asan_dynamic-x86_64.dll + its import lib + the
            # DYNAMIC runtime thunk. The STATIC clang_rt.asan-x86_64.lib is NOT
            # shipped for the MSVC ABI, so static-ASAN linking fails with
            # undefined __asan_* symbols. Use the DYNAMIC model. SECOND gotcha:
            # CMake links DLLs/exes via `cmake -E vs_link_* ... lld-link`, NOT
            # through the clang-cl driver, so -fsanitize=address on the link line
            # is SILENTLY IGNORED by lld-link and the runtime is never
            # auto-linked. It MUST be passed as explicit input libs on every
            # CMake-driven link (libjpeg-*.dll and the fuzz exes).
            # clang_rt.asan_dynamic-x86_64.lib (import lib) resolves __asan_*;
            # /wholearchive on the DYNAMIC runtime thunk forces the ASAN
            # initializer + CRT allocator hooks (malloc/free) in so checks run at
            # runtime. CRITICAL: pair the import lib with asan_DYNAMIC_runtime_thunk,
            # NOT the static one -- the static thunk double-defines malloc/free
            # against the dynamic import lib (lld-link: duplicate symbol:
            # malloc/free), which is what failed jpeg62.dll (jmemmgr.c references
            # malloc directly). Copy the libs into the space-free workspace
            # (CMake space-splits linker flags and "Program Files" has a space)
            # and ship the ASAN DLL beside the libraries.
            LLVM_RT_DIR="C:/Program Files/LLVM/lib/clang"
            ASAN_DYN_IMPORT=""; ASAN_THUNK=""; ASAN_DLL=""
            for d in "$LLVM_RT_DIR"/*/lib/windows; do
              if [ -f "$d/clang_rt.asan_dynamic-x86_64.lib" ]; then ASAN_DYN_IMPORT="$d/clang_rt.asan_dynamic-x86_64.lib"; fi
              if [ -f "$d/clang_rt.asan_dynamic_runtime_thunk-x86_64.lib" ]; then ASAN_THUNK="$d/clang_rt.asan_dynamic_runtime_thunk-x86_64.lib"; fi
              if [ -f "$d/clang_rt.asan_dynamic-x86_64.dll" ]; then ASAN_DLL="$d/clang_rt.asan_dynamic-x86_64.dll"; fi
            done
            if [ -z "$ASAN_DYN_IMPORT" ] || [ -z "$ASAN_THUNK" ]; then
              echo "dynamic ASAN runtime not found under $LLVM_RT_DIR"
              ls -la "$LLVM_RT_DIR"/*/lib/windows/ 2>/dev/null
              exit 1
            fi
            WS_FWD=$(echo "$GITHUB_WORKSPACE" | sed 's|\\|/|g')
            cp "$ASAN_DYN_IMPORT" "$GITHUB_WORKSPACE/asan_dynamic.lib"
            cp "$ASAN_THUNK" "$GITHUB_WORKSPACE/asan_thunk.lib"
            echo "ASAN_DLL=$ASAN_DLL" >> "$GITHUB_ENV"
            echo "ASAN_LDFLAGS=${WS_FWD}/asan_dynamic.lib /wholearchive:${WS_FWD}/asan_thunk.lib /DEBUG" >> "$GITHUB_ENV"
          else
            CLANG=clang
            echo "CC=clang" >> "$GITHUB_ENV"
            echo "CXX=clang++" >> "$GITHUB_ENV"
            echo "ASAN_CFLAGS=-fsanitize=address -g -O1" >> "$GITHUB_ENV"
            echo "ASAN_LDFLAGS=-fsanitize=address" >> "$GITHUB_ENV"
            echo "FUZZ_CFLAGS=-fsanitize=fuzzer-no-link,address -g -O1" >> "$GITHUB_ENV"
          fi

          # Locate the libFuzzer runtime (supplies main() for the fuzz targets).
          # libjpeg-turbo's fuzz/CMakeLists links this archive directly
          # (target_link_libraries(<t> ${FUZZ_LIBRARY} jpeg-static)) and does NOT
          # use -fsanitize=fuzzer for linking, so the real file path is needed.
          # On Windows -print-file-name is unreliable for clang-cl MSVC-ABI
          # runtimes (echoes the bare name), so glob the LLVM resource dir; on
          # Linux -print-file-name resolves the .a correctly.
          FUZZ_LIBRARY=""
          if [ "$RUNNER_OS" = "Windows" ]; then
            for pat in \
              "C:/Program Files/LLVM"/lib/clang/*/lib/windows/clang_rt.fuzzer-x86_64.lib \
              "C:/Program Files/LLVM"/lib/clang/*/lib/windows/libclang_rt.fuzzer-x86_64.lib; do
              if [ -f "$pat" ]; then FUZZ_LIBRARY="$pat"; break; fi
            done
          else
            for cand in clang_rt.fuzzer-x86_64 libclang_rt.fuzzer-x86_64; do
              p=$("$CLANG" -print-file-name=lib$cand.a 2>/dev/null || true)
              if [ -n "$p" ] && [ -f "$p" ]; then FUZZ_LIBRARY="$p"; break; fi
            done
          fi
          test -n "$FUZZ_LIBRARY" || { echo "libFuzzer runtime not found"; ls -la "C:/Program Files/LLVM"/lib/clang/*/lib/windows/ 2>/dev/null; exit 1; }
          echo "FUZZ_LIBRARY=$FUZZ_LIBRARY" >> "$GITHUB_ENV"

      - name: Build libjpeg-turbo static + dynamic (ASAN)
        if: matrix.mode == 'asan'
        shell: bash
        env:
          # MSYS_NO_PATHCONV stops Git Bash from rewriting the MSVC /-flags
          # carried in the cmake *_INIT args: without it, /DEBUG (and the like)
          # becomes "C:/Program Files/Git/DEBUG", corrupting the link flags and
          # making every configure-time check fail (stdint.h "not found",
          # INLINE_WORKS - Failed). libpng's cmake steps set the same guard.
          MSYS_NO_PATHCONV: "1"
        run: |
          mkdir -p out/lib/include
          # ENABLE_STATIC=1 + ENABLE_SHARED=1 produce both libraries.
          # WITH_TURBOJPEG=1 also builds the turbojpeg (TJ) API. WITH_FUZZ=0 so
          # no fuzzer harness targets are built (we ship libraries only).
          cmake -S src -B build-asan -G Ninja \
            -DCMAKE_C_COMPILER="$CC" \
            -DCMAKE_CXX_COMPILER="$CXX" \
            -DCMAKE_C_FLAGS_INIT="$ASAN_CFLAGS" \
            -DCMAKE_CXX_FLAGS_INIT="$ASAN_CFLAGS" \
            -DCMAKE_EXE_LINKER_FLAGS_INIT="$ASAN_LDFLAGS" \
            -DCMAKE_SHARED_LINKER_FLAGS_INIT="$ASAN_LDFLAGS" \
            -DCMAKE_TRY_COMPILE_TARGET_TYPE=STATIC_LIBRARY \
            -DCMAKE_MSVC_RUNTIME_LIBRARY=MultiThreaded \
            -DCMAKE_BUILD_TYPE=Release \
            -DENABLE_STATIC=1 \
            -DENABLE_SHARED=1 \
            -DWITH_TURBOJPEG=1 \
            -DWITH_SIMD=0 \
            -DWITH_FUZZ=0
          cmake --build build-asan

          # Gather real library files only (-type f skips Linux .so symlinks).
          find build-asan -type f \( \
              -name 'libjpeg*.a' -o -name 'libjpeg*.so*' -o \
              -name 'libturbojpeg*.a' -o -name 'libturbojpeg*.so*' -o \
              -name 'jpeg*.lib' -o -name 'jpeg*.dll' -o \
              -name 'turbojpeg*.lib' -o -name 'turbojpeg*.dll' -o \
              -name '*.pdb' \
            \) -exec cp {} out/lib/ \;

          # Public headers: jpeglib.h/jmorecfg.h/jerror.h/turbojpeg.h ship in
          # the source tree; jconfig.h is generated by CMake. The consumer's
          # jpeglib.h #includes "jconfig.h", so the generated copy is the one
          # that matters.
          #
          # libjpeg-turbo >= 3.1 moved its sources (incl. the public headers)
          # into a src/ subdir INSIDE the repo, and we clone upstream INTO a
          # local dir also named 'src', so the headers live at src/src/<h>. The
          # previous fixed 'src/jpeglib.h' path therefore copied NOTHING on 3.1+
          # (silently, behind '2>/dev/null || true') and the release shipped
          # only jconfig.h. Locate each header by name under the clone dir so a
          # future upstream reshuffle cannot drop headers again, and fail loudly
          # if one is missing rather than publishing an incomplete artifact.
          for h in jpeglib.h jmorecfg.h jerror.h turbojpeg.h; do
            found=$(find src -type f -name "$h" -print -quit)
            if [ -n "$found" ]; then
              cp "$found" out/lib/include/
            else
              echo "ERROR: public header $h not found under src/"
              find src -maxdepth 3 -type f -name '*.h' | head -20
              exit 1
            fi
          done
          cp build-asan/jconfig.h out/lib/include/
          # Ship the dynamic ASAN runtime DLL: the ASAN-instrumented libjpeg
          # shared lib imports __asan_* from it, so it must sit beside the lib to
          # run. Windows only -- ASAN_DLL is empty on Linux.
          if [ -n "$ASAN_DLL" ]; then cp "$ASAN_DLL" out/lib/; fi
          ls -la out/lib out/lib/include

      - name: Build libjpeg-turbo libFuzzer targets
        if: matrix.mode == 'libfuzzer'
        shell: bash
        env:
          # Same MSYS_NO_PATHCONV guard as the ASAN step: protects the MSVC
          # /-flags in the cmake *_INIT args from Git Bash path conversion.
          MSYS_NO_PATHCONV: "1"
        run: |
          mkdir -p out/fuzz
          # WITH_FUZZ=1 builds the fuzz/ harnesses (LLVMFuzzerTestOneInput) and
          # links each against the static lib + the libFuzzer runtime
          # (FUZZ_LIBRARY supplies main()). The lib is compiled with fuzzer
          # coverage via FUZZ_CFLAGS (fuzzer-no-link).
          #
          # The fuzz exes are ASAN-instrumented (FUZZ_CFLAGS carries
          # -fsanitize=address) and link via CMake -> `cmake -E vs_link_exe ...
          # lld-link`, which IGNORES clang-cl-driver flags, so on Windows the
          # ASAN runtime is NOT auto-linked and must be passed as explicit input
          # libs (ASAN_LDFLAGS = asan_dynamic.lib + /wholearchive thunk). On
          # Linux the clang++ driver sees -fsanitize=address in CMAKE_CXX_FLAGS
          # at link time and auto-links ASAN, so no extra linker flags are needed.
          FEXE_LDFLAGS=""
          if [ "$RUNNER_OS" = "Windows" ]; then FEXE_LDFLAGS="$ASAN_LDFLAGS"; fi
          cmake -S src -B build-fuzz -G Ninja \
            -DCMAKE_C_COMPILER="$CC" \
            -DCMAKE_CXX_COMPILER="$CXX" \
            -DCMAKE_C_FLAGS_INIT="$FUZZ_CFLAGS" \
            -DCMAKE_CXX_FLAGS_INIT="$FUZZ_CFLAGS" \
            -DCMAKE_EXE_LINKER_FLAGS_INIT="$FEXE_LDFLAGS" \
            -DCMAKE_TRY_COMPILE_TARGET_TYPE=STATIC_LIBRARY \
            -DCMAKE_MSVC_RUNTIME_LIBRARY=MultiThreaded \
            -DCMAKE_BUILD_TYPE=Release \
            -DENABLE_STATIC=1 \
            -DENABLE_SHARED=0 \
            -DWITH_TURBOJPEG=1 \
            -DWITH_SIMD=0 \
            -DWITH_FUZZ=1 \
            -DFUZZ_LIBRARY="$FUZZ_LIBRARY" \
            -DFUZZ_BINDIR="$PWD/out/fuzz" \
            -DFUZZER_SUFFIX=""
          cmake --build build-fuzz

          # FUZZ_BINDIR is the *install* destination, not the build output dir,
          # so the fuzz exes live under build-fuzz/. Gather them (and .pdb
          # sidecars) plus the fuzzer dictionaries from the build tree.
          find build-fuzz -type f \
            \( -name '*_fuzzer' -o -name '*_fuzzer.exe' -o -name '*_fuzzer.pdb' -o -name '*.dict' \) \
            -exec cp {} out/fuzz/ \;
          # Ship the dynamic ASAN runtime DLL beside the fuzz exes: they are
          # ASAN-instrumented and import __asan_* from this DLL at runtime.
          # Windows only -- ASAN_DLL is empty on Linux.
          if [ -n "$ASAN_DLL" ]; then cp "$ASAN_DLL" out/fuzz/; fi
          ls -la out/fuzz

      - name: Verify artifacts
        shell: bash
        run: |
          if [ "${{ matrix.mode }}" = "asan" ]; then
            STAT=$(find out/lib -type f \( -name 'libjpeg*.a' -o -name 'jpeg-static*.lib' -o -name 'jpeg*.lib' \) | head -1)
            DYN=$(find out/lib -type f \( -name 'libjpeg*.so*' -o -name 'jpeg*.dll' \) | head -1)
            test -n "$STAT" || { echo "ERROR: ASAN static lib missing"; exit 1; }
            test -n "$DYN"  || { echo "ERROR: ASAN dynamic lib missing"; exit 1; }
            echo "asan-static:  $STAT"
            echo "asan-dynamic: $DYN"
          else
            FZ=$(find out/fuzz -type f \( -name '*_fuzzer' -o -name '*_fuzzer.exe' \) | head -1)
            test -n "$FZ" || { echo "ERROR: libFuzzer binary missing"; exit 1; }
            echo "libfuzzer: $FZ"
          fi

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: jpeg-asan-${{ matrix.mode }}-${{ matrix.os }}
          path: out
          if-no-files-found: error

  release:
    needs: build
    if: startsWith(github.ref, 'refs/tags/') || (github.event_name == 'workflow_dispatch' && inputs.tag != '')
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Resolve release tag
        id: tag
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ] && [ -n "${{ inputs.tag }}" ]; then
            echo "tag=${{ inputs.tag }}" >> "$GITHUB_OUTPUT"
          else
            echo "tag=${{ github.ref_name }}" >> "$GITHUB_OUTPUT"
          fi

      - name: Pack each artifact into a zip
        # GitHub release assets are FLAT (a file's release path is just its
        # basename, directory structure stripped). Two problems follow for a
        # direct flat upload: (1) cross-artifact duplicate basenames -- the
        # Linux and Windows ASAN legs both ship jpeg-static.lib / libjpeg.a /
        # the public headers, which collide; (2) the cmake-GENERATED jconfig.h
        # differs per platform, so a flat collapse gives one platform the wrong
        # generated config. Packing each artifact into ONE per-platform zip
        # keeps every asset uniquely named and preserves the per-platform
        # generated config + the lib/+include/+fuzz/ tree the consumer needs.
        run: |
          mkdir -p out
          for d in artifacts/*/; do
            name=$(basename "$d")
            (cd artifacts && zip -rq "../out/${name}-${{ steps.tag.outputs.tag }}.zip" "$name")
          done
          echo "--- release zips ---"
          ls -la out

      - name: Publish Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.tag.outputs.tag }}
          name: ${{ steps.tag.outputs.tag }}
          files: out/*.zip
