name: build

on:
  push:
    tags: ["v*", "chrome-*"]
  workflow_dispatch:
    inputs:
      version:
        description: "Chrome version (e.g. 150.0.7871.24). Tags the release chrome-<version>. Leave empty for a build-only run."
        required: false

env:
  # Chrome's libjpeg-turbo fork SHA lives in chrome.lock (written by track.yml).
  # The Chrome fork ships only BUILD.gn (no CMakeLists.txt), so we build the
  # matching UPSTREAM libjpeg-turbo release (read from the fork's jpeglib.h),
  # which is the exact version Chrome vendors, using its native CMake.
  FORK_REPO: https://chromium.googlesource.com/chromium/deps/libjpeg_turbo.git
  UPSTREAM_REPO: https://github.com/libjpeg-turbo/libjpeg-turbo.git

jobs:
  build:
    runs-on: ${{ matrix.os }}
    timeout-minutes: 90
    strategy:
      fail-fast: false
      matrix:
        # libFuzzer only. AFL++ (afl-clang-fast) is Linux-native and cannot run
        # on Windows; Windows AFL++ fuzzing is handled separately via WinAFL.
        os: [ubuntu-latest, windows-latest]

    steps:
      - name: Checkout this repository
        uses: actions/checkout@v4

      - name: Read Chrome-locked revision from chrome.lock
        id: lock
        shell: bash
        run: |
          echo "sha=$(jq -r .sha chrome.lock)" >> "$GITHUB_OUTPUT"

      - name: Resolve the libjpeg-turbo release Chrome vendors
        id: ver
        shell: bash
        run: |
          # Read LIBJPEG_TURBO_VERSION straight from the Chrome fork's header so
          # the build always matches the version Chrome actually ships.
          HDR=$(curl -fsSL "${FORK_REPO}/+/${{ steps.lock.outputs.sha }}/src/jpeglib.h?format=TEXT" | base64 -d)
          LJT_VER=$(printf '%s\n' "$HDR" | sed -nE 's/#define[[:space:]]+LIBJPEG_TURBO_VERSION[[:space:]]+([0-9.]+)/\1/p' | head -1)
          test -n "$LJT_VER" || { echo "could not determine libjpeg-turbo version from fork header"; exit 1; }
          echo "libjpeg_turbo_version=$LJT_VER" >> "$GITHUB_OUTPUT"
          echo "Resolved Chrome libjpeg-turbo version: $LJT_VER"

      - name: Install dependencies (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            build-essential cmake ninja-build git ca-certificates curl clang

      - name: Install dependencies (Windows)
        if: runner.os == 'Windows'
        shell: bash
        run: |
          # clang-cl and cmake are preinstalled on windows-latest.
          choco install ninja -y --no-progress

      - name: Fetch upstream libjpeg-turbo source (Chrome-vendored release)
        shell: bash
        run: |
          git clone --depth 1 --branch "${{ steps.ver.outputs.libjpeg_turbo_version }}" "$UPSTREAM_REPO" src

      - name: Resolve the libFuzzer toolchain
        shell: bash
        run: |
          if [ "$RUNNER_OS" = "Windows" ]; then
            # clang-cl fuzzer runtime (supplies main() + coverage for Windows).
            FUZZ_LIBRARY=""
            for cand in clang_rt.fuzzer-x86_64.lib libclang_rt.fuzzer-x86_64.lib; do
              p=$(clang-cl -print-file-name="$cand" 2>/dev/null || true)
              if [ -n "$p" ] && [ -f "$p" ]; then FUZZ_LIBRARY="$p"; break; fi
            done
            test -n "$FUZZ_LIBRARY" || { echo "clang-cl fuzzer runtime not found"; exit 1; }
            echo "CC=clang-cl" >> "$GITHUB_ENV"
            echo "CXX=clang-cl" >> "$GITHUB_ENV"
            # /Zi emits CodeView in the objects; /DEBUG makes the linker write a
            # side .pdb next to each fuzz target so ASAN stacks resolve to source.
            echo "ENGINE_CFLAGS=-fsanitize=fuzzer-no-link,address -g -O1 /Zi" >> "$GITHUB_ENV"
            echo "ENGINE_LDFLAGS=-fsanitize=address /DEBUG" >> "$GITHUB_ENV"
            echo "FUZZ_LIBRARY=$FUZZ_LIBRARY" >> "$GITHUB_ENV"
          else
            FUZZ_LIBRARY=$(clang -print-file-name=libclang_rt.fuzzer-x86_64.a)
            echo "CC=clang" >> "$GITHUB_ENV"
            echo "CXX=clang++" >> "$GITHUB_ENV"
            echo "ENGINE_CFLAGS=-fsanitize=fuzzer-no-link,address -g -O1" >> "$GITHUB_ENV"
            echo "ENGINE_LDFLAGS=-fsanitize=address" >> "$GITHUB_ENV"
            echo "FUZZ_LIBRARY=$FUZZ_LIBRARY" >> "$GITHUB_ENV"
          fi

      - name: Set up MSVC environment (Windows)
        if: runner.os == 'Windows'
        uses: ilammy/msvc-dev-cmd@v1
        with:
          arch: x64

      - name: Build libjpeg-turbo native fuzz targets
        shell: bash
        run: |
          mkdir -p out
          cmake -S src -B build -G Ninja \
            -DCMAKE_C_COMPILER="$CC" \
            -DCMAKE_CXX_COMPILER="$CXX" \
            -DCMAKE_C_FLAGS_INIT="$ENGINE_CFLAGS" \
            -DCMAKE_CXX_FLAGS_INIT="$ENGINE_CFLAGS" \
            -DCMAKE_EXE_LINKER_FLAGS_INIT="$ENGINE_LDFLAGS" \
            -DCMAKE_TRY_COMPILE_TARGET_TYPE=STATIC_LIBRARY \
            -DENABLE_SHARED=0 \
            -DENABLE_STATIC=1 \
            -DWITH_TURBOJPEG=1 \
            -DWITH_SIMD=0 \
            -DWITH_FUZZ=1 \
            -DFUZZ_BINDIR="$PWD/out" \
            -DFUZZ_LIBRARY="$FUZZ_LIBRARY" \
            -DFUZZER_SUFFIX=""
          cmake --build build

      - name: Smoke test (one run per target)
        shell: bash
        run: |
          for f in out/*; do
            case "$f" in *.pdb) continue;; esac   # PDBs are not executables
            "./$f" -runs=1 >/dev/null 2>&1 || true
          done

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: jpeg-libfuzzer-${{ runner.os }}
          path: out/*
          if-no-files-found: error

  release:
    needs: build
    if: startsWith(github.ref, 'refs/tags/') || (github.event_name == 'workflow_dispatch' && inputs.version != '')
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Resolve release tag
        id: tag
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ] && [ -n "${{ inputs.version }}" ]; then
            echo "tag=chrome-${{ inputs.version }}" >> "$GITHUB_OUTPUT"
          else
            echo "tag=${{ github.ref_name }}" >> "$GITHUB_OUTPUT"
          fi

      - name: Publish Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.tag.outputs.tag }}
          name: ${{ steps.tag.outputs.tag }}
          files: artifacts/**/*
